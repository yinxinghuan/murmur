<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Murmur Logo — Final</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; font-family: -apple-system, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 24px; margin-bottom: 32px; }
  .row { display: flex; gap: 20px; justify-content: center; align-items: flex-start; margin-bottom: 24px; }
  .icon { display: flex; align-items: center; justify-content: center; border-radius: 22px; }
  .icon svg { display: block; }
  .dark { background: #0a0a0a; }
  .light { background: #fff; border: 1px solid #ddd; }
  .gray { background: #808080; }
  .s128 { width: 128px; height: 128px; border-radius: 28px; }
  .s128 svg { width: 72px; height: 72px; }
  .s64 { width: 64px; height: 64px; border-radius: 14px; }
  .s64 svg { width: 36px; height: 36px; }
  .s32 { width: 32px; height: 32px; border-radius: 8px; }
  .s32 svg { width: 18px; height: 18px; }
  .label { text-align: center; font-size: 12px; color: #999; margin-top: 6px; }
</style>
</head>
<body>

<h1>Murmur Logo — E 粗版（对称修正）</h1>

<!-- Large -->
<div class="row">
  <div>
    <div class="icon dark s128"><svg viewBox="0 0 100 100"><g fill="white"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
    <div class="label">黑底白字</div>
  </div>
  <div>
    <div class="icon light s128"><svg viewBox="0 0 100 100"><g fill="black"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
    <div class="label">白底黑字</div>
  </div>
  <div>
    <div class="icon gray s128"><svg viewBox="0 0 100 100"><g fill="white"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
    <div class="label">灰底</div>
  </div>
</div>

<!-- Medium + Small -->
<div class="row">
  <div class="icon dark s64"><svg viewBox="0 0 100 100"><g fill="white"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
  <div class="icon light s64"><svg viewBox="0 0 100 100"><g fill="black"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
  <div class="icon dark s32"><svg viewBox="0 0 100 100"><g fill="white"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
  <div class="icon light s32"><svg viewBox="0 0 100 100"><g fill="black"><rect x="20" y="40" width="10" height="20" rx="5"/><rect x="33" y="30" width="10" height="40" rx="5"/><rect x="46" y="22" width="10" height="56" rx="5"/><rect x="59" y="30" width="10" height="40" rx="5"/><rect x="72" y="40" width="10" height="20" rx="5"/></g></svg></div>
</div>

</body>
</html>
